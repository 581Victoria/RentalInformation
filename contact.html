      <div class="container navbar">

            <span></span><span></span><span></span>

    <main id="content" class="container">
      <section class="hero">
        <h1>Need to Reach out to us?</h1>
        <p>Send us a quick email using the form below.</p>
      </section>

      <section class="section">
        <!-- FORM ENGINE: Connected to ouldssalena@gmail.com -->
       <form class="card card-content" action="https://formsubmit.co" method="POST">
  <div class="form-row">
    <div>
      <label for="name">Name</label>
      <input class="input" id="name" name="name" type="text" required />
    </div>
    <div>
      <label for="email">Email</label>
      <input class="input" id="email" name="email" type="email" required />
    </div>
  </div>
  <div>
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" class="input" required></textarea>
  </div>
  <p><button type="submit" class="btn">Send Message</button></p>
</form>

      </section>
    </main>

    <footer>
      <div class="container footer-inner">
        <div>© 2026 581 Victoria Street</div>
