<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />

    <title>Contact · 581 Victoria Street</title>
    <link rel="stylesheet" href="assets/css/common.css" />
    <link rel="stylesheet" href="assets/css/about.css" />
    
    <style>
      /* Keeping the same nice button style from your Documents page */
      .doc-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 20px;
        width: 100%;
        box-sizing: border-box;
      }

      .doc-item {
        width: 100%;
        max-width: 600px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-decoration: none;
        color: inherit;
        display: flex;
        align-items: center;
        padding: 20px;
        border: 1px solid #eee;
        box-sizing: border-box;
      }

      .doc-icon { font-size: 2rem; margin-right: 20px; }
      .doc-info h3 { margin: 0; font-size: 1.1rem; color: #333; }
      .doc-info p { margin: 5px 0 0; font-size: 0.9rem; color: #666; }
      .hero-text { text-align: center; padding: 40px 20px; width: 100%; box-sizing: border-box; }

      .section-title {
        width: 100%;
        max-width: 600px;
        text-align: left;
        margin: 30px 0 10px 0;
        font-family: sans-serif;
        color: #666;
        font-size: 1.2rem;
        border-bottom: 2px solid #eee;
        padding-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <a href="#content" class="skip-link">Skip to content</a>

          <button id="hamburger" class="hamburger" aria-label="Menu" aria-controls="navLinks" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
        </div>

          </div>
