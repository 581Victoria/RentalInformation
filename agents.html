<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery · 581 Victoria Street</title>
    <link rel="stylesheet" href="assets/css/common.css" />
    <style>
  /* Resetting default browser margins that cause "right-leaning" images */
  body, html {
    margin: 0;
    padding: 0;
    overflow-x: hidden; /* Prevents side-scrolling on iPhone */
  }

  /* Centering the main container */
  .gallery-container {
    display: flex;
    flex-direction: column;
    align-items: center; /* This is the "magic" line for centering */
    gap: 30px;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
  }

  /* Centering each image card */
  .gallery-item {
    width: 100%;
    max-width: 600px; /* Adjust this if you want images wider/narrower */
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin: 0 auto; /* Forces equal space on left and right */
  }

  /* Making sure the image stays inside the centered box */
  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }

  .gallery-item figcaption {
    padding: 15px;
    font-weight: bold;
    background: #f9f9f9;
    text-align: center;
    color: #333;
    border-top: 1px solid #eee;
  }

  .hero-text {
    text-align: center;
    padding: 40px 20px;
    width: 100%;
    box-sizing: border-box;
  }
</style>
  </head>
  <body>
    <header class="site-header">
      <div class="container navbar">
        <a class="logo" href="index.html">581 <span>Victoria Street</span></a>
        <nav class="nav-links" id="navLinks" aria-label="Primary">
          <a href="index.html" class="active">Home</a>
          <a href="agents.html" class="">Floor Plan and Rooms</a>
          <a href="services.html" class="">Documents</a>
          <a href="about.html" class="">About</a>
          <a href="contact.html" class="">Contact</a>
        </nav>
        <div class="controls">
          <button
            id="themeToggle"
            class="btn ghost"
            onclick="toggleTheme()"
            aria-pressed="false"
            aria-label="Toggle dark mode"
          >
            🌓
          </button>
          <button
            id="hamburger"
            class="hamburger"
            aria-label="Menu"
            aria-controls="navLinks"
            aria-expanded="false"
          >
            <span></span><span></span><span></span>
          </button>
        </div>

      </div>
    </header>

    <main class="container">
      <section class="hero-text">
        <h1>Property Gallery</h1>
        <p>Scroll down to view all areas of the home.</p>
      </section>

      <div class="gallery-container">
        <!-- Exterior & Location -->

        <figure class="gallery-item"><img src="images2/Location.jpg"><figcaption>Location</figcaption></figure>
        <figure class="gallery-item"><img src="images2/PropertyLines.jpg"><figcaption>Property Lines</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Parking.jpg"><figcaption>Parking</figcaption></figure>
        <figure class="gallery-item"><img src="images2/OutdoorSpace.jpg"><figcaption>Outdoor Space</figcaption></figure>

        <!-- Common Areas -->
        <figure class="gallery-item"><img src="images2/CommonSpace.jpg"><figcaption>Common Space</figcaption></figure>
        <figure class="gallery-item"><img src="images2/CommonSpace2.jpg"><figcaption>Common Space (Alt View)</figcaption></figure>
        <figure class="gallery-item"><img src="images2/SharedSpaceLaundry.jpg"><figcaption>Laundry Area</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Kitchen.jpg"><figcaption>Kitchen</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Kitchen2.jpg"><figcaption>Kitchen (Alt View)</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Kitchen3.jpg"><figcaption>Kitchen (Detail)</figcaption></figure>

        <!-- Bathrooms -->
        <figure class="gallery-item"><img src="images2/BathroomA.jpg"><figcaption>Bathroom A</figcaption></figure>
        <figure class="gallery-item"><img src="images2/BathroomB.jpg"><figcaption>Bathroom B</figcaption></figure>

        <!-- Bedrooms -->
        <figure class="gallery-item"><img src="images2/Bedroom1a.jpg"><figcaption>Bedroom 1a</figcaption></figure>
        <figure class="gallery-item"><img src="images2/bedroom1b.jpg"><figcaption>Bedroom 1b</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Bedroom2a.jpg"><figcaption>Bedroom 2a</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Bedroom2b.jpg"><figcaption>Bedroom 2b</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Bedroom3a.jpg"><figcaption>Bedroom 3a</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Bedroom3b.jpg"><figcaption>Bedroom 3b</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Bedroom4a.jpg"><figcaption>Bedroom 4a</figcaption></figure>
        <figure class="gallery-item"><img src="images2/Bedroom4b.jpg"><figcaption>Bedroom 4b</figcaption></figure>

        <!-- Floor Plans -->
        <figure class="gallery-item"><img src="images2/1stFloorMod.jpg"><figcaption>1st Floor Plan</figcaption></figure>
        <figure class="gallery-item"><img src="images2/2ndFloor.jpg"><figcaption>2nd Floor Plan</figcaption></figure>
        <figure class="gallery-item"><img src="images2/3rdFloor.jpg"><figcaption>3rd Floor Plan</figcaption></figure>
      </div>
    </main>

    <footer style="text-align: center; padding: 40px; color: #888;">
      © 2026 581 Victoria Street
    </footer>
  </body>
</html>
